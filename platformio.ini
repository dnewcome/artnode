[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino

lib_deps =
    fastled/FastLED @ ^3.7.0
    https://github.com/rstephan/ArtnetWifi
    bblanchon/ArduinoJson @ ^7.0.0
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ ^3.0.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1

monitor_speed = 115200
upload_speed = 921600

# OTA upload: pio run -t upload -e esp32dev-ota
[env:esp32dev-ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
upload_protocol = espota
upload_port = artnode.local
lib_deps = ${env:esp32dev.lib_deps}

# Wokwi simulator build: pio run -e wokwi
# Then open wokwi/diagram.json in the Wokwi VSCode extension (or run wokwi-cli).
[env:wokwi]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_deps = ${env:esp32dev.lib_deps}
